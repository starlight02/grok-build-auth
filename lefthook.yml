# lefthook.yml
# Pre-commit quality gate for grok-build-auth
# Auto-installs hooks on first run: lefthook install

pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: |
        if command -v ruff >/dev/null 2>&1; then
          ruff format --check {staged_files}
        elif command -v uvx >/dev/null 2>&1; then
          uvx ruff format --check {staged_files}
        else
          echo "❌ neither 'ruff' nor 'uvx' found on PATH" >&2
          exit 1
        fi
      stage_fixed: true

    ruff-check:
      glob: "*.py"
      run: |
        if command -v ruff >/dev/null 2>&1; then
          ruff check {staged_files}
        elif command -v uvx >/dev/null 2>&1; then
          uvx ruff check {staged_files}
        else
          echo "❌ neither 'ruff' nor 'uvx' found on PATH" >&2
          exit 1
        fi

    pyright:
      glob: "*.py"
      run: |
        if command -v pyright >/dev/null 2>&1; then
          pyright {staged_files}
        else
          echo "❌ pyright not found on PATH (pip install -e '.[dev]')" >&2
          exit 1
        fi

    pytest:
      glob: "*.{py,toml}"
      run: |
        if command -v pytest >/dev/null 2>&1; then
          pytest
        elif command -v python3 >/dev/null 2>&1 && python3 -m pytest --version >/dev/null 2>&1; then
          python3 -m pytest
        elif [ -x .venv/bin/python ] && .venv/bin/python -m pytest --version >/dev/null 2>&1; then
          .venv/bin/python -m pytest
        elif command -v uvx >/dev/null 2>&1; then
          uvx pytest
        else
          echo "❌ pytest not found (pip install -e '.[dev]')" >&2
          exit 1
        fi

commit-msg:
  commands:
    conventional-commits:
      run: bash scripts/commit-msg-check.sh {1}
